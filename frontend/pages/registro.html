<!DOCTYPE html>
<html lang="pt-BR">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>EcoRadar</title>

    <link rel="icon" href="../assets/img/logoEcoradar.png" type="image/png">

    <link rel="stylesheet" href="../css/resgistro.css">

    <link rel="preconnect" href="https://fonts.googleapis.com">

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

</head>

<body>

    <div class="background">

        <div class="register-card">

            <img src="../assets/img/logoEcoradar.png" alt="Logo" class="logo">

            <h1>Criar sua conta</h1>

            <p class="subtitle">
                Crie sua conta no EcoRadar
            </p>

            <form id="registerForm">

                <div class="input-group">

                    <label>Nome completo</label>

                    <div class="input-box">

                        <input 
                            type="text" 
                            placeholder="Digite seu nome completo"
                            id="name"
                            required
                        >

                    </div>

                </div>

                <div class="input-group">

                    <label>Email</label>

                    <div class="input-box">

                        <input 
                            type="email" 
                            placeholder="seu@email.com"
                            id="email"
                            required
                        >

                    </div>

                </div>

                <div class="input-group">

                    <label>Senha</label>

                    <div class="input-box">

                        <input 
                            type="password" 
                            placeholder="Crie uma senha" 
                            id="senha"
                            required
                        >

                        <i class="fa-solid fa-eye" id="toggleSenha" style="color: #8CAA3F;"></i>

                    </div>

                </div>

                <div class="input-group">

                    <label>Confirmar senha</label>

                    <div class="input-box">

                        <input 
                            type="password" 
                            placeholder="Digite a senha novamente" 
                            id="confirmarSenha"
                            required
                        >

                        <i class="fa-solid fa-eye" id="toggleConfirmar" style="color: #8CAA3F;"></i>

                    </div>

                </div>

                <button type="submit">
                    Criar conta
                </button>

            </form>

            <div class="login-link">

                <p>
                    Já possui uma conta?

                    <a href="/">
                        Entrar
                    </a>

                </p>

            </div>

        </div>

    </div>

    <script src="../js/toggle.js"></script>
    <script src="../js/registro.js"></script>

</body>

</html>
